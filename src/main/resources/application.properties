spring.application.name=Auctionsystem
# Kết nối MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/auction_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate
# CHỈ DÙNG 'create' TRONG LẦN CHẠY ĐẦU TIÊN ĐỂ TẠO BẢNG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Hiện chi tiết lỗi khởi tạo Bean và JPA
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.tool.schema=INFO

# Hiện lỗi khi thực hiện truy vấn

logging.level.org.hibernate.SQL=INFO
